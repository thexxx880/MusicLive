<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Movie & TV Explorer</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0b12;
            color: white;
            overflow-x: hidden;
        }
        /* HEADER */
        header {
            display: flex;
            justify-content: center;
            padding: 20px;
            position: sticky;
            top: 0;
            background: #0b0b12;
            z-index: 100;
        }
        #search {
            width: 420px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #1b1b2b;
            color: white;
            font-size: 16px;
            outline: none;
        }
        /* SEARCH DROPDOWN */
        #suggestions {
            position: absolute;
            top: 70px;
            width: 420px;
            background: #14141f;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        }
        .suggestion {
            display: flex;
            gap: 10px;
            padding: 10px;
            cursor: pointer;
            align-items: center;
            transition: .2s;
        }
        .suggestion:hover {
            background: #8B5CF6;
        }
        .suggestion img {
            width: 40px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }
        .suggestionInfo {
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }
        .suggestionMeta {
            font-size: 12px;
            color: #ccc;
        }
        /* SECTIONS */
        .section {
            padding-left: 20px;
            margin-top: 20px;
            font-size: 22px;
        }
        /* SLIDERS */
        .rowContainer {
            position: relative;
        }
        .row {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            gap: 14px;
            padding: 20px;
            scroll-behavior: smooth;
        }
        .row::-webkit-scrollbar {
            display: none;
        }
        /* ARROWS */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            padding: 10px 16px;
            z-index: 5;
        }
        .arrowLeft { left: 0; }
        .arrowRight { right: 0; }
        /* CARDS */
        .card {
            min-width: 160px;
            cursor: pointer;
            transition: transform .25s ease, box-shadow .25s ease;
        }
        .card img {
            width: 100%;
            border-radius: 8px;
        }
        .card:hover {
            transform: scale(1.12);
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
        }
        /* TOP 10 */
        .rankCard {
            position: relative;
            min-width: 200px;
            cursor: pointer;
            transition: transform .25s ease, box-shadow .25s ease;
        }
        .rankCard img {
            width: 180px;
            border-radius: 8px;
        }
        .rankCard:hover {
            transform: scale(1.12);
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
        }
        .rankNumber {
            position: absolute;
            left: -10px;
            bottom: -10px;
            font-size: 120px;
            font-weight: bold;
            color: #8B5CF6;
            opacity: .25;
            pointer-events: none;
        }
        /* SEARCH GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
            padding: 20px;
        }
        /* DETAILS PAGE */
        #details {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0b0b12;
            display: none;
            overflow-y: auto;
            z-index: 200;
        }
        /* BANNER */
        #banner {
            height: 420px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: end;
            padding: 40px;
        }
        .bannerContent {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
        }
        /* BUTTONS */
        #backBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }
        #launchBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #8B5CF6;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        /* TV SELECTOR */
        #launchOverlay {
            position: absolute;
            top: 100px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            padding: 18px;
            border-radius: 10px;
            display: none;
        }
        select,
        button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            margin-top: 8px;
        }
        #confirmLaunch {
            background: #8B5CF6;
            color: white;
            cursor: pointer;
            width: 100%;
        }
        /* CAST */
        .castRow {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 20px;
        }
        .castCard {
            min-width: 120px;
            text-align: center;
        }
        .castCard img {
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <div style="position:relative">
            <input id="search" placeholder="Search movies or TV shows">
            <div id="suggestions"></div>
        </div>
    </header>

    <div class="section">Top 10 Movies Today</div>
    <div class="rowContainer">
        <button class="arrow arrowLeft" onclick="slide('movies',-1)">❮</button>
        <div id="movies" class="row"></div>
        <button class="arrow arrowRight" onclick="slide('movies',1)">❯</button>
    </div>

    <div class="section">Top 10 TV Shows Today</div>
    <div class="rowContainer">
        <button class="arrow arrowLeft" onclick="slide('tv',-1)">❮</button>
        <div id="tv" class="row"></div>
        <button class="arrow arrowRight" onclick="slide('tv',1)">❯</button>
    </div>

    <div id="results" class="grid"></div>

    <!-- DETAILS -->
    <div id="details">
        <button id="backBtn">← Back</button>
        <button id="launchBtn">Launch</button>

        <div id="launchOverlay">
            <select id="seasonSelect"></select>
            <select id="episodeSelect"></select>
            <button id="confirmLaunch">Confirm</button>
        </div>

        <div id="banner">
            <div class="bannerContent">
                <h1 id="title"></h1>
                <p id="overview"></p>
                <p id="rating"></p>
                <p id="genres"></p>
            </div>
        </div>

        <div class="section">Cast</div>
        <div id="cast" class="castRow"></div>
    </div>

    <script>
        const API_KEY = "3a591d9ea5339b99994d6366821b4b42";
        const IMG = "https://image.tmdb.org/t/p/w500";

        const search = document.getElementById("search");
        const suggestions = document.getElementById("suggestions");
        const results = document.getElementById("results");

        let currentID = null;
        let currentType = null;

        async function fetchData(url) {
            const res = await fetch(url);
            return res.json();
        }

        function slide(id, dir) {
            document.getElementById(id).scrollBy({ left: dir * 500, behavior: "smooth" });
        }

        /* TRENDING */
        async function loadTrending() {
            const moviesData = await fetchData(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}`);
            document.getElementById("movies").innerHTML = moviesData.results.slice(0, 10).map((x, i) =>
                `<div class="rankCard" onclick="openDetails(${x.id},'movie')">
                    <div class="rankNumber">${i + 1}</div>
                    <img src="${IMG + x.poster_path}">
                </div>`
            ).join("");

            const tvData = await fetchData(`https://api.themoviedb.org/3/trending/tv/day?api_key=${API_KEY}`);
            document.getElementById("tv").innerHTML = tvData.results.slice(0, 10).map((x, i) =>
                `<div class="rankCard" onclick="openDetails(${x.id},'tv')">
                    <div class="rankNumber">${i + 1}</div>
                    <img src="${IMG + x.poster_path}">
                </div>`
            ).join("");
        }

        /* SEARCH */
        search.addEventListener("input", async () => {
            const q = search.value.trim();
            if (q.length < 2) {
                suggestions.style.display = "none";
                return;
            }

            const data = await fetchData(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}`);

            const filtered = data.results.filter(x => x.media_type === "movie" || x.media_type === "tv");

            suggestions.innerHTML = filtered.slice(0, 6).map(x => {
                const title = x.title || x.name;
                const poster = x.poster_path ? IMG + x.poster_path : "";
                const year = (x.release_date || x.first_air_date || "").slice(0, 4);
                const rating = x.vote_average ? x.vote_average.toFixed(1) : "N/A";

                return `<div class="suggestion" onclick="openDetails(${x.id},'${x.media_type}')">
                    <img src="${poster}">
                    <div class="suggestionInfo">
                        <div>${title}</div>
                        <div class="suggestionMeta">${year} • ⭐ ${rating}</div>
                    </div>
                </div>`;
            }).join("");

            suggestions.style.display = "block";
        });

        /* DETAILS */
        async function openDetails(id, type) {
            currentID = id;
            currentType = type;

            document.getElementById("launchOverlay").style.display = "none";
            document.getElementById("seasonSelect").innerHTML = "";
            document.getElementById("episodeSelect").innerHTML = "";

            const data = await fetchData(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}`);

            document.getElementById("banner").style.backgroundImage = `ur[](https://image.tmdb.org/t/p/original${data.backdrop_path})`;
            document.getElementById("title").textContent = data.title || data.name;
            document.getElementById("overview").textContent = data.overview || "No overview available.";
            document.getElementById("rating").textContent = `⭐ ${data.vote_average ? data.vote_average.toFixed(1) : "N/A"}`;
            document.getElementById("genres").textContent = data.genres ? data.genres.map(g => g.name).join(", ") : "";

            document.getElementById("details").style.display = "block";

            loadCast(id, type);

            if (type === "tv") {
                loadSeasons(id);
            }
        }

        /* CAST */
        async function loadCast(id, type) {
            const data = await fetchData(`https://api.themoviedb.org/3/${type}/${id}/credits?api_key=${API_KEY}`);
            document.getElementById("cast").innerHTML = data.cast.slice(0, 12).map(actor =>
                `<div class="castCard">
                    <img src="${IMG + (actor.profile_path || '')}">
                    <div>${actor.name}</div>
                </div>`
            ).join("");
        }

        /* TV SEASONS */
        async function loadSeasons(id) {
            const data = await fetchData(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`);
            const seasonSelect = document.getElementById("seasonSelect");
            seasonSelect.innerHTML = "";

            data.seasons.forEach(s => {
                if (s.season_number === 0) return;
                seasonSelect.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`;
            });

            loadEpisodes();
        }

        async function loadEpisodes() {
            const season = document.getElementById("seasonSelect").value;
            if (!season) return;

            const data = await fetchData(`https://api.themoviedb.org/3/tv/${currentID}/season/${season}?api_key=${API_KEY}`);
            const ep = document.getElementById("episodeSelect");
            ep.innerHTML = "";

            data.episodes.forEach(e => {
                ep.innerHTML += `<option value="${e.episode_number}">Episode ${e.episode_number}</option>`;
            });
        }

        document.getElementById("seasonSelect").addEventListener("change", loadEpisodes);

        /* PLAYER */
        document.getElementById("launchBtn").onclick = () => {
            if (currentType === "movie") {
                window.open(`https://vidlink.pro/movie/${currentID}`, "_blank");
            } else {
                document.getElementById("launchOverlay").style.display = "block";
            }
        };

        document.getElementById("confirmLaunch").onclick = () => {
            const s = document.getElementById("seasonSelect").value;
            const e = document.getElementById("episodeSelect").value;
            window.open(`https://vidlink.pro/tv/${currentID}/${s}/${e}`, "_blank");
        };

        /* CLOSE */
        document.getElementById("backBtn").onclick = () => {
            document.getElementById("details").style.display = "none";
        };

        /* INIT */
        loadTrending();
    </script>
</body>
</html>
